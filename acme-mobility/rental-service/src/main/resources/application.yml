server:
  port: 8080

spring:
  application:
    name: rental-service

# ─────────────────────────────────────────────────────────────────
# Camunda / Zeebe client  (io.camunda.spring:spring-boot-starter-camunda)
# Gateway address is overridden in the 'docker' profile below.
# ─────────────────────────────────────────────────────────────────
zeebe:
  client:
    broker:
      gateway-address: localhost:26500
      rest-address: http://localhost:8088
    security:
      plaintext: true
    worker:
      default-name: rental-service-worker
    message:
      time-to-live: PT1H

management:
  health:
    zeebe:
      enabled: false

# ─────────────────────────────────────────────────────────────────
# BPMN auto-deployment
# ─────────────────────────────────────────────────────────────────
  deployment:
    resources: "classpath:bpmn/*.bpmn"

# ─────────────────────────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────────────────────────
logging:
  level:
    com.acme: DEBUG
    io.camunda.zeebe: INFO

---
# Docker profile: overrides gateway for container-to-container networking
spring:
  config:
    activate:
      on-profile: docker

zeebe:
  client:
    broker:
      gateway-address: zeebe:26500
      rest-address: http://zeebe:8080
