<main class="vehicles-shell">
  <acme-status-bar
    [state]="rentalService.vehicleLoadingState()"
    [vehicleCount]="rentalService.stats().total" />

  <acme-stats-bar
    [stats]="rentalService.stats()" />

  <acme-vehicle-map
    [vehicles]="rentalService.vehicles()"
    (vehicleSelected)="onVehicleSelected($event)"
    (scanQrSelected)="onScanQr($event)"
    (prenotaSelected)="onPrenota($event)" />

  <acme-process-trace
    [logs]="rentalService.logs()" />
</main>
