<header class="app-header">
  <span class="logo" aria-hidden="true">🛴</span>
  <h1 class="title">ACME Mobility</h1>

  <div class="user-container" *ngIf="session.isLoggedIn()">
    <span class="user-tag">👤 {{ session.userName() }}</span>
    <button class="logout-btn" (click)="onLogout()" aria-label="Logout" title="Logout">
      <span aria-hidden="true">🚪 Logout</span>
    </button>
  </div>
</header>
