# ─────────────────────────────────────────────────────────────────────────────
# ACMEMobility — Docker Compose
#
# Services:
#   zeebe           → Camunda 8 workflow engine  (port 26500 gRPC, 8088 HTTP)
#   rental-service  → Spring Boot 3 orchestrator (port 8080)
#   frontend        → Angular 21 SPA via nginx   (port 3000)
# ─────────────────────────────────────────────────────────────────────────────

networks:
  acme-net:
    driver: bridge

services:

  # ── Camunda 8 / Zeebe ──────────────────────────────────────────────────────
  zeebe:
    image: camunda/zeebe:8.4.0
    container_name: acme-zeebe
    environment:
      - ZEEBE_BROKER_EXPORTERS_HAZELCAST_CLASSNAME=io.zeebe.hazelcast.exporter.HazelcastExporter
      - SPRING_CONFIG_ADDITIONAL_LOCATION=file:/usr/local/zeebe/config/
    ports:
      - "26500:26500"   # gRPC gateway (Zeebe client)
      - "8088:8080"     # HTTP management API
    networks:
      - acme-net
    healthcheck:
      test: ["CMD-SHELL", "timeout 10 bash -c ':> /dev/tcp/localhost/26500'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── RentalService (Spring Boot 3 / Java 21) ───────────────────────────────
  rental-service:
    build:
      context: ./rental-service
      dockerfile: Dockerfile
    container_name: acme-rental-service
    environment:
      - ZEEBE_CLIENT_BROKER_GATEWAYADDRESS=zeebe:26500
      - ZEEBE_CLIENT_SECURITY_PLAINTEXT=true
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8080:8080"     # REST API + WebSocket
    networks:
      - acme-net
    depends_on:
      zeebe:
        condition: service_healthy

  # ── Frontend (Angular 21 / nginx) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: acme-frontend
    ports:
      - "3000:80"       # http://localhost:3000
    networks:
      - acme-net
    depends_on:
      - rental-service
