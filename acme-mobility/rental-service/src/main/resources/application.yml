server:
  port: 8080

spring:
  application:
    name: rental-service

# ─────────────────────────────────────────────────────────────────
# Camunda 8 Client Configuration
# ─────────────────────────────────────────────────────────────────
camunda:
  client:
    mode: simple
    zeebe:
      gateway-address: localhost:26500
      rest-address: http://localhost:8083
      security:
        plaintext: true
      defaults:
        default-name: rental-service-worker
    message:
      time-to-live: PT1H

management:
  health:
    camunda:
      enabled: false

# ─────────────────────────────────────────────────────────────────
# BPMN auto-deployment (Moved to root level!)
# ─────────────────────────────────────────────────────────────────
deployment:
  resources: "classpath:bpmn/*.bpmn"

# ─────────────────────────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────────────────────────
logging:
  level:
    com.acme: DEBUG
    io.camunda.zeebe: INFO

---
# Docker profile: overrides gateway for container-to-container networking
spring:
  config:
    activate:
      on-profile: docker

camunda:
  client:
    zeebe:
      gateway-address: orchestration:26500
      rest-address: http://orchestration:8080